# Robust Netlify build configuration running from the repository root

[build]
  # Build command: enters frontend folder, installs dependencies, and runs Vite build
  command = "cd frontend && npm install && npm run build"
  
  # Publish directory: the compiled static folder relative to the repo root
  publish = "frontend/dist"

# Prevents API calls from falling back to index.html and throwing JSON doctype errors
[[redirects]]
  from = "/api/*"
  status = 404

# Redirect rule for Single Page Apps (SPA) to avoid 404 on page refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
